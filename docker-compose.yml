version: '3.8'

services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: sharedbrain-redis
    ports:
      - "6381:6379"
    volumes:
      - ./redis-data:/data
    environment:
      - REDIS_ARGS=--requirepass ${REDIS_PASSWORD} --appendonly yes
    restart: unless-stopped
